version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  json:
    class: pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(name)s %(levelname)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/xclaw.log
    maxBytes: 10485760  # 10MB
    backupCount: 5

loggers:
  xclaw:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  tesla_client:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  discord:
    level: INFO
    handlers: [console]
    propagate: false
  
  telegram:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console]
